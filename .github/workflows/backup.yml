# Backup via query direta - v3
name: Backup D1 Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Test Auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler whoami

      - name: Backup via SQL queries
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "-- Bailado Carioca Backup ${DATE}" > backup_${DATE}.sql

          for TABLE in students teachers units classes class_teachers enrollments payments private_packages private_sessions private_payments cash_entries; do
            echo "-- Table: ${TABLE}" >> backup_${DATE}.sql
            wrangler d1 execute bailado_carioca_escola_db --remote \
              --command "SELECT * FROM ${TABLE}" \
              --json >> backup_${DATE}.sql 2>/dev/null || echo "-- Skipped ${TABLE}" >> backup_${DATE}.sql
          done

          echo "Backup concluído:"
          ls -lh backup_${DATE}.sql

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.sql
          retention-days: 30