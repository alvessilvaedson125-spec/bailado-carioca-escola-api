name: Backup D1 Database

on:
  schedule:
    - cron: '0 3 * * *'  # Todo dia às 03:00 UTC (00:00 Brasília)
  workflow_dispatch:      # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Export D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DATE=$(date +%Y-%m-%d)
          wrangler d1 export bailado_carioca_escola_db --remote --output backup_${DATE}.sql

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.sql
          retention-days: 30  # Mantém os últimos 30 dias de backup