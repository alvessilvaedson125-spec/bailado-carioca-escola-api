# Backup via REST API - v2

name: Backup D1 Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export D1 via REST API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DATE=$(date +%Y-%m-%d)
          DB_ID="081c69b7-c6ad-441b-98b7-84c555b7d147"

          # Inicia o export
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DB_ID}/export" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"output_format": "polling"}')

          echo "Export response: $RESPONSE"

          # Extrai o at_bookmark e filename
          AT_BOOKMARK=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('at_bookmark',''))" 2>/dev/null || echo "")
          STATUS=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('status',''))" 2>/dev/null || echo "")

          echo "Status: $STATUS"
          echo "At bookmark: $AT_BOOKMARK"

          # Polling até completar
          for i in {1..30}; do
            POLL=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DB_ID}/export" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -G --data-urlencode "at_bookmark=${AT_BOOKMARK}")

            STATUS=$(echo $POLL | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('status',''))" 2>/dev/null || echo "")
            echo "Poll $i status: $STATUS"

            if [ "$STATUS" = "complete" ]; then
              DOWNLOAD_URL=$(echo $POLL | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('signed_url',''))" 2>/dev/null || echo "")
              echo "Download URL found"
              curl -s -o "backup_${DATE}.sql" "$DOWNLOAD_URL"
              echo "Backup saved: backup_${DATE}.sql"
              ls -lh backup_${DATE}.sql
              break
            fi

            sleep 5
          done

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup_*.sql
          retention-days: 30